    <header class="site-header">

      <nav class="site-nav" aria-label="主要導覽">

          <p class="eyebrow">Direction</p>

        </div>
        <p>保留可愛角色的親和力，同時讓品牌在商業應用上保持乾淨、清楚、容易延伸。未來可加入更多實際商品照、印刷打樣和社群貼文截圖。</p>
