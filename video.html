<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>影片剪輯作品 | Pluffy Studio</title>
    <meta
      name="description"
      content="帕芙工坊 Pluffy Studio 的影片剪輯作品 archive，收錄過去剪輯過的短影音、活動紀錄與宣傳影片。"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand-mark" href="index.html#top" aria-label="回到帕芙工坊首頁">
        <img src="assets/pluffy-logo.jpg" alt="帕芙工坊 Pluffy Studio Logo">
        <span>Pluffy Studio</span>
      </a>
      <nav class="site-nav" aria-label="主要導覽">
        <a href="index.html#about">關於</a>
        <a href="index.html#work">作品</a>
        <a href="playground.html">遊戲</a>
        <a href="video.html">剪輯</a>
        <a href="pricing.html">價目</a>
        <a href="index.html#contact">聯絡</a>
      </nav>
    </header>

    <main>
      <section class="project-hero section-band">
        <div>
          <a class="back-link" href="index.html#video">回首頁</a>
          <p class="eyebrow">Video archive</p>
          <h1>影片剪輯作品</h1>
          <p>
            這裡收錄過去剪輯過的影片與影像作品。之後可以放影片封面、作品連結、製作年份與負責內容。
          </p>
        </div>
        <div class="project-cover video-cover" aria-hidden="true">
          <span></span>
          <b></b>
        </div>
      </section>

      <section class="section-wrap">
        <div class="section-heading compact-heading">
          <p class="eyebrow">Past edits</p>
          <h2>Archive</h2>
        </div>
        <div class="video-grid" data-cms-videos>
          <article class="video-card">
            <div class="video-thumb" aria-hidden="true"><span></span></div>
            <div>
              <span class="tag">Short Video</span>
              <h3>短影音剪輯 01</h3>
              <p>可放影片封面、平台連結、剪輯方向與使用素材說明。</p>
            </div>
          </article>
          <article class="video-card">
            <div class="video-thumb alt" aria-hidden="true"><span></span></div>
            <div>
              <span class="tag">Event</span>
              <h3>活動紀錄剪輯 02</h3>
              <p>適合放活動紀錄、花絮、宣傳影片或社群 Reels 作品。</p>
            </div>
          </article>
          <article class="video-card">
            <div class="video-thumb soft" aria-hidden="true"><span></span></div>
            <div>
              <span class="tag">Promo</span>
              <h3>宣傳影片剪輯 03</h3>
              <p>可以標註負責項目，例如剪輯、字幕、配樂、節奏設計。</p>
            </div>
          </article>
        </div>
      </section>
    </main>
    <script src="scripts/cms-content.js"></script>
  </body>
</html>
